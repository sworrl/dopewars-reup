# No-secrets build check. Green = the Godot project imports and boots without script/parse errors.
# Signing + publishing releases stays LOCAL (the release keystore never touches GitHub) — see tools/release.sh.
name: Build check
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  GODOT_VERSION: 4.6.2-stable

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Godot ${{ env.GODOT_VERSION }} (headless)
        run: |
          GV="$GODOT_VERSION"
          curl -sL -o godot.zip "https://github.com/godotengine/godot/releases/download/$GV/Godot_v${GV}_linux.x86_64.zip"
          unzip -q godot.zip
          sudo mv "Godot_v${GV}_linux.x86_64" /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot
          godot --version

      - name: Import + compile/boot check
        run: |
          cd dopewars-reup
          # First pass builds the .godot import cache (fonts/textures). Its log has expected first-run
          # "Cannot open .godot/imported/*" noise before the cache exists — we don't gate on it. Run twice
          # so the cache is fully warm before the real boot.
          godot --headless --import >/dev/null 2>&1 || true
          godot --headless --import >/dev/null 2>&1 || true
          # The gate: boot the project headless and fail only on genuine GDScript errors.
          godot --headless --quit-after 12 2>&1 | tee /tmp/run.log || true
          if grep -qiE "SCRIPT ERROR|Parse Error|Compile Error|Failed to load script" /tmp/run.log; then
            echo "::error::GDScript errors on boot:"
            grep -iE "SCRIPT ERROR|Parse Error|Compile Error|Failed to load script" /tmp/run.log | head -40
            exit 1
          fi
          echo "Build check passed — project imports and boots clean."
