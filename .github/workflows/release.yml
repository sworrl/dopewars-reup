# Signed-APK release pipeline. Push a tag like `v0.2.0` and this builds the signed APK, computes its
# checksum, emits the update manifest (latest.json), and publishes a GitHub Release with all three.
# The in-app Updater polls that release's latest.json and offers players the update.
#
# One-time setup — add these repo secrets (Settings → Secrets and variables → Actions):
#   KEYSTORE_BASE64  base64 of your RELEASE keystore:  base64 -w0 dopewars-release.jks
#   KS_PASS          keystore password
#   KEY_ALIAS        key alias (e.g. dopewars)
#   KEY_PASS         key password
# Use a dedicated release keystore kept OFF the repo. Its cert fingerprint is your users' trust anchor;
# every future update MUST be signed by the same key or Android refuses to install over the top.

name: Release
on:
  push:
    tags: ['v*']

permissions:
  contents: write   # create the GitHub Release

env:
  GODOT_VERSION: 4.6.2-stable

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Install matching build-tools
        run: |
          yes | sdkmanager "build-tools;34.0.0" >/dev/null
          echo "BT=$ANDROID_SDK_ROOT/build-tools/34.0.0" >> "$GITHUB_ENV"

      - name: Install Godot + export templates
        run: |
          GV="$GODOT_VERSION"
          BASE="https://github.com/godotengine/godot/releases/download/$GV"
          curl -sL -o godot.zip "$BASE/Godot_v${GV}_linux.x86_64.zip"
          unzip -q godot.zip
          sudo mv "Godot_v${GV}_linux.x86_64" /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot
          curl -sL -o templates.tpz "$BASE/Godot_v${GV}_export_templates.tpz"
          TPL_DIR="$HOME/.local/share/godot/export_templates/${GV%-stable}.stable"
          mkdir -p "$TPL_DIR"
          unzip -q templates.tpz -d /tmp/tpl
          mv /tmp/tpl/templates/* "$TPL_DIR/"

      - name: Restore Android build-template libs
        run: |
          # godot-lib*.aar are >100MB, gitignored, and ship inside the export templates.
          TPL_DIR="$HOME/.local/share/godot/export_templates/${GODOT_VERSION%-stable}.stable"
          unzip -oq "$TPL_DIR/android_source.zip" -d /tmp/android_source
          mkdir -p drugwars-reup/android/build/libs
          cp /tmp/android_source/libs/*.aar drugwars-reup/android/build/libs/ 2>/dev/null || true

      - name: Decode release keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > /tmp/release.jks

      - name: Build signed APK + checksums + manifest
        env:
          GODOT: /usr/local/bin/godot
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          KEYSTORE: /tmp/release.jks
          KS_PASS: ${{ secrets.KS_PASS }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASS: ${{ secrets.KEY_PASS }}
          REPO: ${{ github.repository }}
          NOTES: "Dope Wars: Re-Up ${{ github.ref_name }}"
        run: bash tools/release.sh "$VERSION"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Dope Wars: Re-Up ${{ github.ref_name }}"
          files: |
            drugwars-reup/builds/dopewars-reup-*.apk
            drugwars-reup/builds/SHA256SUMS.txt
            drugwars-reup/builds/latest.json
